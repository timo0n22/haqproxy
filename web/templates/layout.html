<!doctype html>
<html lang="ru" data-theme="{{.Theme}}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>haqproxy</title>
  <link rel="stylesheet" href="/static/app.css">
  <script src="/static/htmx.min.js"></script>
</head>
<body>
<div class="app">
  <nav class="sidebar">
    <div class="brand">haq<span>proxy</span></div>
    <div class="nav-item active" hx-get="/view/history" hx-target="#main" hx-swap="innerHTML"
         onclick="setActive(this)">🗂️ History</div>
    <div class="nav-item" hx-get="/view/replay" hx-target="#main" hx-swap="innerHTML"
         onclick="setActive(this)">🔁 Replay</div>
    <div class="nav-item" hx-get="/view/matrix" hx-target="#main" hx-swap="innerHTML"
         onclick="setActive(this)">🧮 Matrix</div>
    <div class="nav-item" hx-get="/view/automate" hx-target="#main" hx-swap="innerHTML"
         onclick="setActive(this)">🤖 Automate</div>
    <div class="nav-item" hx-get="/view/findings" hx-target="#main" hx-swap="innerHTML"
         onclick="setActive(this)">🔎 Findings
      <span class="badge" hx-get="/view/findings/count" hx-trigger="load, every 5s" hx-target="this" hx-swap="innerHTML">0</span>
    </div>
    <div class="nav-item" hx-get="/view/domlogger" hx-target="#main" hx-swap="innerHTML"
         onclick="setActive(this)">🧬 DOM
      <span class="badge" hx-get="/view/domlogger/count" hx-trigger="load, every 5s" hx-target="this" hx-swap="innerHTML">0</span>
    </div>
    <div class="nav-item" hx-get="/view/collaborator" hx-target="#main" hx-swap="innerHTML"
         onclick="setActive(this)">📡 Collaborator</div>
    <div class="nav-item" hx-get="/view/scope" hx-target="#main" hx-swap="innerHTML"
         onclick="setActive(this)">🎯 Scope</div>
    <div class="spacer"></div>
    <div class="nav-item" hx-get="/view/settings" hx-target="#main" hx-swap="innerHTML"
         onclick="setActive(this)">⚙️ Settings</div>
    <div class="foot">
      TLS-перехват:<br>
      <a href="/ca-cert" download="haqproxy-ca.pem">скачать CA-сертификат</a>
    </div>
  </nav>
  <main class="main" id="main">
    {{template "history_view" .}}
  </main>
</div>
<script>
  function setActive(el) {
    document.querySelectorAll('.sidebar .nav-item').forEach(n => n.classList.remove('active'));
    el.classList.add('active');
  }
  // Настройки UI: тема и прозрачность окна применяются сразу и сохраняются.
  function haqPostUI(body){
    fetch('/api/settings/ui', {method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'}, body: body});
  }
  function haqSetTheme(v){
    document.documentElement.dataset.theme = v;
    haqPostUI('theme=' + encodeURIComponent(v));
  }
  function haqSetAlpha(v){
    // Нативная прозрачность окна доступна только в GUI (webview.Bind).
    if (window.haq_setAlpha) { try { window.haq_setAlpha(parseFloat(v)); } catch(e){} }
    var l = document.getElementById('alpha-val');
    if (l) l.textContent = Math.round(parseFloat(v)*100) + '%';
    haqPostUI('alpha=' + encodeURIComponent(v));
  }

  // Клик по строке истории — подсветка выбранной.
  document.body.addEventListener('click', function(e){
    const tr = e.target.closest('tr[data-entry]');
    if (tr) {
      document.querySelectorAll('tr[data-entry].sel').forEach(x=>x.classList.remove('sel'));
      tr.classList.add('sel');
    }
  });
</script>
</body>
</html>
